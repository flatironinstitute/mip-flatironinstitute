          gfortran-15 --version
          ln -s /opt/homebrew/bin/gfortran-15 /opt/homebrew/bin/gfortran
          gfortran --version

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout mip
        uses: actions/checkout@v4
        with:
          repository: mip-org/mip
          path: mip

      - name: Set up MIP_ROOT
        shell: bash
        run: |
          mkdir -p "$HOME/.mip/packages"
          echo "MIP_ROOT=$HOME/.mip" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests pyyaml

      - name: Prepare packages
        env:
          BUILD_ARCHITECTURE: macos_arm64
        run: python scripts/prepare_packages.py ${{ inputs.force && '--force' || '' }}

      - name: Check for packages to bundle
        id: check
        run: |
          if [ -d build/prepared ] && [ -n "$(ls -A build/prepared 2>/dev/null)" ]; then
            echo "has_packages=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_packages=false" >> "$GITHUB_OUTPUT"
            echo "No packages to bundle, skipping remaining steps"
          fi
        shell: bash

      - name: Set up MATLAB
        if: steps.check.outputs.has_packages == 'true'
        uses: matlab-actions/setup-matlab@v2
        with:
          cache: true

      - name: Bundle packages with mip
        if: steps.check.outputs.has_packages == 'true'
        uses: matlab-actions/run-command@v2
        env:
          BUILD_ARCHITECTURE: macos_arm64
        with:
          command: "addpath('mip'); addpath('scripts'); bundle_packages"

      - name: Upload bundled artifacts
        if: steps.check.outputs.has_packages == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bundled-macos_arm64
          path: build/bundled/

  test-macos:
    runs-on: macos-latest
    needs: build-macos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout mip
        uses: actions/checkout@v4
        with:
          repository: mip-org/mip
          path: mip

      - name: Set up MIP_ROOT
        shell: bash
        run: |
          mkdir -p "$HOME/.mip/packages"
          echo "MIP_ROOT=$HOME/.mip" >> "$GITHUB_ENV"

      - name: Download bundled artifact
        uses: actions/download-artifact@v4
        with:
          pattern: bundled-macos_arm64
          path: build/bundled
          merge-multiple: true

      - name: Check for bundled packages
        id: check
        shell: bash
        run: |
          if ls build/bundled/*.mhl >/dev/null 2>&1; then
            echo "has_packages=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_packages=false" >> "$GITHUB_OUTPUT"
            echo "No bundled packages to test, skipping remaining steps"
          fi

      - name: Set up MATLAB
        if: steps.check.outputs.has_packages == 'true'
        uses: matlab-actions/setup-matlab@v2
        with:
          cache: true

      - name: Strip build environment
        if: steps.check.outputs.has_packages == 'true'
        shell: bash
        run: |
          # Rename rather than rm -rf: an APFS rename is a metadata-only
          # op (~ms), while rm -rf walks 100k+ files in Xcode/Homebrew
          # and takes ~3 min. The runner is ephemeral so leaving the
          # bytes on disk is fine; the test only needs the paths to be
          # unfindable by the linker / loader.
          for d in /Applications/Xcode*.app; do
            [ -e "$d" ] || continue
            sudo mv "$d" "${d}.deleted"
          done
          if [ -e /Library/Developer ]; then
            sudo mv /Library/Developer /Library/Developer.deleted
          fi
          if [ -e ~/Library/Developer ]; then
            sudo mv ~/Library/Developer ~/Library/Developer.deleted
          fi
          sudo pkgutil --forget com.apple.pkg.CLTools_Executables 2>/dev/null || true
          sudo pkgutil --forget com.apple.pkg.CLTools_SDK_macOS 2>/dev/null || true
          sudo pkgutil --forget com.apple.pkg.DeveloperToolsCLI 2>/dev/null || true
          sudo xcode-select --reset 2>/dev/null || true
          if [ -e /opt/homebrew ]; then
            sudo mv /opt/homebrew /opt/homebrew.deleted
          fi

      - name: Test bundled packages
        # MATLAB R2024b+ on macOS arm64 SIGSEGVs in _pthread_tsd_cleanup at
        # shutdown for any MEX linking Homebrew libgomp/libgfortran (see
        # https://github.com/wmutschl/matlab_openmp_tls_bug). The crash is
        # cosmetic — tests complete before MATLAB exits. We write a marker
        # file on full success and gate the step on its presence so that a
        # real test/load failure still fails the step, but the exit-time
        # SIGSEGV is tolerated. matlab-actions/run-command can't make this
        # distinction, so we invoke matlab directly.
        if: steps.check.outputs.has_packages == 'true'
        shell: bash
        run: |
          rm -f .tests_passed
          set +e
          matlab -batch "addpath('mip'); addpath('scripts'); try; test_bundled_packages; fid = fopen('.tests_passed', 'w'); fclose(fid); catch err; disp(getReport(err)); exit(1); end"
          rc=$?
          if [ -f .tests_passed ]; then
            echo "::notice::tests passed (matlab rc=$rc; exit-time SIGSEGV tolerated)"
            exit 0
          else
            echo "::error::tests failed (rc=$rc, no .tests_passed marker)"
            exit 1
          fi

  build-numbl-wasm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout mip
        uses: actions/checkout@v4
        with:
          repository: mip-org/mip
          path: mip

      - name: Set up MIP_ROOT
        shell: bash
        run: |
          mkdir -p "$HOME/.mip/packages"
          echo "MIP_ROOT=$HOME/.mip" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests pyyaml

      - name: Prepare packages
        env:
          BUILD_ARCHITECTURE: numbl_wasm
        run: python scripts/prepare_packages.py ${{ inputs.force && '--force' || '' }}

      - name: Check for packages to bundle
        id: check
        run: |
          if [ -d build/prepared ] && [ -n "$(ls -A build/prepared 2>/dev/null)" ]; then
            echo "has_packages=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_packages=false" >> "$GITHUB_OUTPUT"
            echo "No packages to bundle, skipping remaining steps"
          fi
        shell: bash

      - name: Set up MATLAB
        if: steps.check.outputs.has_packages == 'true'
        uses: matlab-actions/setup-matlab@v2
        with:
          cache: true

      - name: Install Emscripten
        if: steps.check.outputs.has_packages == 'true'
        uses: mymindstorm/setup-emsdk@v14

      - name: Verify Emscripten
        if: steps.check.outputs.has_packages == 'true'
        run: emcc --version

      - name: Bundle packages with mip
        if: steps.check.outputs.has_packages == 'true'
        uses: matlab-actions/run-command@v2
        env:
          BUILD_ARCHITECTURE: numbl_wasm
        with:
          command: "addpath('mip'); addpath('scripts'); bundle_packages"

      - name: Upload bundled artifacts
        if: steps.check.outputs.has_packages == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bundled-numbl_wasm
          path: build/bundled/

  build-numbl-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y gcc-10 g++-10 libfftw3-dev libopenblas-dev
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-10 100 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-10
          sudo update-alternatives --install /usr/bin/cc cc /usr/bin/gcc-10 100
          sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/g++-10 100
          sudo update-alternatives --set gcc /usr/bin/gcc-10
