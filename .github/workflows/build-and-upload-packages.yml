name: Build and Upload Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force:
        description: 'Force rebuild of all packages'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Install and switch to GCC 10
        run: |
          sudo apt update
          sudo apt install -y gcc-10 g++-10 patchelf
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-10 100 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-10
          sudo update-alternatives --install /usr/bin/cc cc /usr/bin/gcc-10 100
          sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/g++-10 100
          sudo update-alternatives --set gcc /usr/bin/gcc-10
          sudo update-alternatives --set cc /usr/bin/gcc-10
          sudo update-alternatives --set c++ /usr/bin/g++-10
          echo "CC=gcc-10" >> "$GITHUB_ENV"
          echo "CXX=g++-10" >> "$GITHUB_ENV"
        shell: bash

      - name: Verify GCC version
        run: gcc --version

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout mip
        uses: actions/checkout@v4
        with:
          repository: mip-org/mip
          path: mip

      - name: Set up MIP_ROOT
        shell: bash
        run: |
          mkdir -p "$HOME/.mip/packages"
          echo "MIP_ROOT=$HOME/.mip" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests pyyaml

      - name: Prepare packages
        env:
          BUILD_ARCHITECTURE: linux_x86_64
        run: python scripts/prepare_packages.py ${{ inputs.force && '--force' || '' }}

      - name: Check for packages to bundle
        id: check
        run: |
          if [ -d build/prepared ] && [ -n "$(ls -A build/prepared 2>/dev/null)" ]; then
            echo "has_packages=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_packages=false" >> "$GITHUB_OUTPUT"
            echo "No packages to bundle, skipping remaining steps"
          fi
        shell: bash

      - name: Set up MATLAB
        if: steps.check.outputs.has_packages == 'true'
        uses: matlab-actions/setup-matlab@v2
        with:
          cache: true
          release: R2022a

      - name: Bundle packages with mip
        if: steps.check.outputs.has_packages == 'true'
        uses: matlab-actions/run-command@v2
        env:
          BUILD_ARCHITECTURE: linux_x86_64
        with:
          command: "addpath('mip'); addpath('scripts'); bundle_packages"

      - name: Upload bundled artifacts
        if: steps.check.outputs.has_packages == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bundled-linux_x86_64
          path: build/bundled/

  test-linux:
    runs-on: ubuntu-latest
    needs: build-linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout mip
        uses: actions/checkout@v4
        with:
          repository: mip-org/mip
          path: mip

      - name: Set up MIP_ROOT
        shell: bash
        run: |
          mkdir -p "$HOME/.mip/packages"
          echo "MIP_ROOT=$HOME/.mip" >> "$GITHUB_ENV"

      - name: Download bundled artifact
        uses: actions/download-artifact@v4
        with:
          pattern: bundled-linux_x86_64
          path: build/bundled
          merge-multiple: true

      - name: Check for bundled packages
        id: check
        shell: bash
        run: |
          if ls build/bundled/*.mhl >/dev/null 2>&1; then
            echo "has_packages=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_packages=false" >> "$GITHUB_OUTPUT"
            echo "No bundled packages to test, skipping remaining steps"
          fi

      - name: Set up MATLAB
        if: steps.check.outputs.has_packages == 'true'
        uses: matlab-actions/setup-matlab@v2
        with:
          cache: true
          release: R2022a

      - name: Strip build environment
        if: steps.check.outputs.has_packages == 'true'
        shell: bash
        run: |
          # Explicit gcc list (not 'gcc*'): the wildcard would also match
          # gcc-N-base, which libgcc-s1/libstdc++6/libgomp1 depend on, so
          # apt's resolver refuses the whole transaction and the strip
          # silently no-ops via `|| true`.
          sudo apt-get purge -y \
            gcc gcc-12 gcc-13 gcc-14 'g++*' \
            'clang*' 'llvm*' 'libllvm*' 'lld*' \
            'gfortran*' 'libgfortran*' \
            'libgomp*' 'libquadmath*' 'libatomic*' 'libitm*' 'libomp*' \
            'libasan*' 'libubsan*' 'libtsan*' 'liblsan*' 'libcc1*' 'libssp*' \
            'cmake*' make ninja-build \
            'libstdc++-*-dev' 'libgcc-*-dev' libc6-dev \
            patchelf build-essential \
            'binutils*' \
            autoconf automake libtool pkg-config bison flex m4 || true
          sudo apt-get autoremove -y --purge
          sudo rm -rf /home/linuxbrew

      - name: Verify strip
        if: steps.check.outputs.has_packages == 'true'
        shell: bash
        run: |
          leaked=0
          for c in gcc g++ gfortran cc c++ clang ld as cmake patchelf; do
            if command -v "$c" >/dev/null 2>&1; then
              echo "::error::Leaked binary: $c at $(command -v "$c")"
              leaked=1
            fi
          done
          for lib in libgfortran libgomp libquadmath; do
            if /sbin/ldconfig -p 2>/dev/null | grep -q "$lib"; then
              hits=$(/sbin/ldconfig -p 2>/dev/null | grep "$lib" | tr -s ' ' || true)
              echo "::error::Leaked runtime lib $lib:"
              echo "$hits"
              leaked=1
            fi
          done
          if [ "$leaked" -ne 0 ]; then
            echo "Strip did not remove expected toolchain; aborting before test." >&2
            exit 1
          fi
          echo "Strip OK: no compiler binaries or runtime libs on the linker path."

      - name: Test bundled packages
        if: steps.check.outputs.has_packages == 'true'
        uses: matlab-actions/run-command@v2
        with:
          command: "addpath('mip'); addpath('scripts'); test_bundled_packages"

