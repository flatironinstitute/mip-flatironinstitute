  build-macos:
    runs-on: macos-latest

    steps:
      - name: Install system dependencies
        run: brew install fftw

      - name: Make alias for gfortran
        run: |
          gfortran-15 --version
          ln -s /opt/homebrew/bin/gfortran-15 /opt/homebrew/bin/gfortran
          gfortran --version

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout mip
        uses: actions/checkout@v4
        with:
          repository: mip-org/mip
          path: mip

      - name: Set up MIP_ROOT
        shell: bash
        run: |
          mkdir -p "$HOME/.mip/packages"
          echo "MIP_ROOT=$HOME/.mip" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests pyyaml

      - name: Prepare packages
        env:
          BUILD_ARCHITECTURE: macos_arm64
        run: python scripts/prepare_packages.py ${{ inputs.force && '--force' || '' }}

      - name: Check for packages to bundle
        id: check
        run: |
          if [ -d build/prepared ] && [ -n "$(ls -A build/prepared 2>/dev/null)" ]; then
            echo "has_packages=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_packages=false" >> "$GITHUB_OUTPUT"
            echo "No packages to bundle, skipping remaining steps"
          fi
        shell: bash

      - name: Set up MATLAB
        if: steps.check.outputs.has_packages == 'true'
        uses: matlab-actions/setup-matlab@v2
        with:
          cache: true

      - name: Bundle packages with mip
        if: steps.check.outputs.has_packages == 'true'
        uses: matlab-actions/run-command@v2
        env:
          BUILD_ARCHITECTURE: macos_arm64
        with:
          command: "addpath('mip'); addpath('scripts'); bundle_packages"

      - name: Upload bundled artifacts
        if: steps.check.outputs.has_packages == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bundled-macos_arm64
          path: build/bundled/

      - name: Strip build environment
        if: steps.check.outputs.has_packages == 'true'
        shell: bash
        run: |
          sudo rm -rf /Applications/Xcode*.app
          sudo rm -rf /Library/Developer
          sudo pkgutil --forget com.apple.pkg.CLTools_Executables 2>/dev/null || true
          sudo pkgutil --forget com.apple.pkg.CLTools_SDK_macOS 2>/dev/null || true
          sudo pkgutil --forget com.apple.pkg.DeveloperToolsCLI 2>/dev/null || true
          sudo rm -rf ~/Library/Developer
          sudo xcode-select --reset 2>/dev/null || true
          sudo rm -rf /opt/homebrew /usr/local/Homebrew /usr/local/Cellar
          sudo rm -rf /usr/local/var/homebrew /usr/local/etc/bash_completion.d
          for d in /usr/local/bin /opt/homebrew/bin; do
            if [ -d "$d" ]; then
              sudo find "$d" -maxdepth 1 -type l -delete 2>/dev/null || true
            fi
          done
          sudo rm -f /opt/homebrew/bin/gfortran /usr/local/bin/gfortran

      - name: Test bundled packages
        if: steps.check.outputs.has_packages == 'true'
        uses: matlab-actions/run-command@v2
        with:
          command: "addpath('mip'); addpath('scripts'); test_bundled_packages"

