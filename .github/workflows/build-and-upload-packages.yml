  test-numbl-macos:
    runs-on: macos-latest
    needs: build-numbl-macos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout mip
        uses: actions/checkout@v4
        with:
          repository: mip-org/mip
          path: mip

      - name: Set up MIP_ROOT
        shell: bash
        run: |
          mkdir -p "$HOME/.mip/packages"
          echo "MIP_ROOT=$HOME/.mip" >> "$GITHUB_ENV"

      - name: Download bundled artifact
        uses: actions/download-artifact@v4
        with:
          pattern: bundled-numbl_macos_arm64
          path: build/bundled
          merge-multiple: true

      - name: Check for bundled packages
        id: check
        shell: bash
        run: |
          if ls build/bundled/*.mhl >/dev/null 2>&1; then
            echo "has_packages=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_packages=false" >> "$GITHUB_OUTPUT"
            echo "No bundled packages to test, skipping remaining steps"
          fi

      - name: Set up MATLAB
        if: steps.check.outputs.has_packages == 'true'
        uses: matlab-actions/setup-matlab@v2
        with:
          cache: true

      - name: Strip build environment
        if: steps.check.outputs.has_packages == 'true'
        shell: bash
        run: |
          sudo rm -rf /Applications/Xcode*.app
          sudo rm -rf /Library/Developer
          sudo rm -rf ~/Library/Developer
          sudo pkgutil --forget com.apple.pkg.CLTools_Executables 2>/dev/null || true
          sudo pkgutil --forget com.apple.pkg.CLTools_SDK_macOS 2>/dev/null || true
          sudo pkgutil --forget com.apple.pkg.DeveloperToolsCLI 2>/dev/null || true
          sudo xcode-select --reset 2>/dev/null || true
          sudo rm -rf /opt/homebrew

      - name: Test bundled packages
        if: steps.check.outputs.has_packages == 'true'
        uses: matlab-actions/run-command@v2
        with:
          command: "addpath('mip'); addpath('scripts'); test_bundled_packages"

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout mip
        uses: actions/checkout@v4
        with:
          repository: mip-org/mip
          path: mip

      - name: Set up MIP_ROOT
        shell: bash
        run: |
          mkdir -p "$HOME/.mip/packages"
          echo "MIP_ROOT=$HOME/.mip" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests pyyaml

      - name: Prepare packages
        env:
          BUILD_ARCHITECTURE: windows_x86_64
        run: python scripts/prepare_packages.py ${{ inputs.force && '--force' || '' }}

      - name: Check for packages to bundle
        id: check
        run: |
          if [ -d build/prepared ] && [ -n "$(ls -A build/prepared 2>/dev/null)" ]; then
            echo "has_packages=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_packages=false" >> "$GITHUB_OUTPUT"
            echo "No packages to bundle, skipping remaining steps"
          fi
        shell: bash

      - name: Set up MATLAB
        if: steps.check.outputs.has_packages == 'true'
        uses: matlab-actions/setup-matlab@v2
        with:
          cache: true

      - name: Bundle packages with mip
        if: steps.check.outputs.has_packages == 'true'
        uses: matlab-actions/run-command@v2
        env:
          BUILD_ARCHITECTURE: windows_x86_64
        with:
          command: "addpath('mip'); addpath('scripts'); bundle_packages"

      - name: Upload bundled artifacts
        if: steps.check.outputs.has_packages == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bundled-windows_x86_64
          path: build/bundled/

      - name: Strip build environment
        if: steps.check.outputs.has_packages == 'true'
        shell: pwsh
        run: |
          $vsInstaller = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
          $vsPath = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise"
          if ((Test-Path $vsInstaller) -and (Test-Path $vsPath)) {
            & $vsInstaller uninstall --installPath $vsPath --quiet --norestart --force --wait
          }
          if (Get-Command choco -ErrorAction SilentlyContinue) {
            choco list -r 2>$null | ForEach-Object {
              $pkg = ($_ -split '\|')[0]
              if ($pkg -and $pkg -ne 'chocolatey') {
                choco uninstall $pkg -y --force --skip-autouninstaller
              }
            }
          }
          $paths = @(
            "C:\Program Files\Microsoft Visual Studio",
            "C:\Program Files (x86)\Microsoft Visual Studio",
            "C:\Program Files (x86)\Windows Kits",
            "C:\Program Files\LLVM",
            "C:\Strawberry",
            "C:\msys64",
            "C:\mingw64",
            "C:\ProgramData\chocolatey",
            "C:\Program Files\CMake",
            "C:\Program Files\Git\mingw64"
          )
          foreach ($p in $paths) {
            Remove-Item -Recurse -Force -ErrorAction SilentlyContinue $p
          }

      - name: Test bundled packages
        if: steps.check.outputs.has_packages == 'true'
        uses: matlab-actions/run-command@v2
        with:
          command: "addpath('mip'); addpath('scripts'); test_bundled_packages"

  build-any:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout mip
        uses: actions/checkout@v4
        with:
          repository: mip-org/mip
          path: mip

      - name: Set up MIP_ROOT
        shell: bash
        run: |
          mkdir -p "$HOME/.mip/packages"
          echo "MIP_ROOT=$HOME/.mip" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests pyyaml

      - name: Prepare packages
        env:
          BUILD_ARCHITECTURE: any
        run: python scripts/prepare_packages.py ${{ inputs.force && '--force' || '' }}

      - name: Check for packages to bundle
        id: check
        run: |
          if [ -d build/prepared ] && [ -n "$(ls -A build/prepared 2>/dev/null)" ]; then
            echo "has_packages=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_packages=false" >> "$GITHUB_OUTPUT"
            echo "No packages to bundle, skipping remaining steps"
          fi
        shell: bash

      - name: Set up MATLAB
        if: steps.check.outputs.has_packages == 'true'
        uses: matlab-actions/setup-matlab@v2
        with:
          cache: true

      - name: Bundle packages with mip
        if: steps.check.outputs.has_packages == 'true'
        uses: matlab-actions/run-command@v2
        env:
          BUILD_ARCHITECTURE: any
        with:
          command: "addpath('mip'); addpath('scripts'); bundle_packages"

      - name: Upload bundled artifacts
        if: steps.check.outputs.has_packages == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bundled-any
          path: build/bundled/

  test-any:
    runs-on: ubuntu-latest
    needs: build-any

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout mip
        uses: actions/checkout@v4
        with:
          repository: mip-org/mip
          path: mip

      - name: Set up MIP_ROOT
        shell: bash
        run: |
          mkdir -p "$HOME/.mip/packages"
          echo "MIP_ROOT=$HOME/.mip" >> "$GITHUB_ENV"

      - name: Download bundled artifact
        uses: actions/download-artifact@v4
        with:
          pattern: bundled-any
          path: build/bundled
          merge-multiple: true

      - name: Check for bundled packages
        id: check
        shell: bash
        run: |
          if ls build/bundled/*.mhl >/dev/null 2>&1; then
            echo "has_packages=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_packages=false" >> "$GITHUB_OUTPUT"
            echo "No bundled packages to test, skipping remaining steps"
          fi

      - name: Set up MATLAB
        if: steps.check.outputs.has_packages == 'true'
        uses: matlab-actions/setup-matlab@v2
        with:
          cache: true

      - name: Strip build environment
        if: steps.check.outputs.has_packages == 'true'
        shell: bash
        run: |
          # Explicit gcc list (not 'gcc*'): the wildcard would also match
          # gcc-N-base, which libgcc-s1/libstdc++6/libgomp1 depend on, so
          # apt's resolver refuses the whole transaction and the strip
          # silently no-ops via `|| true`.
          sudo apt-get purge -y \
            gcc gcc-12 gcc-13 gcc-14 'g++*' \
            'clang*' 'llvm*' 'libllvm*' 'lld*' \
            'gfortran*' 'libgfortran*' \
            'libgomp*' 'libquadmath*' 'libatomic*' 'libitm*' 'libomp*' \
            'libasan*' 'libubsan*' 'libtsan*' 'liblsan*' 'libcc1*' 'libssp*' \
            'cmake*' make ninja-build \
            'libstdc++-*-dev' 'libgcc-*-dev' libc6-dev \
            patchelf build-essential \
            'binutils*' \
            autoconf automake libtool pkg-config bison flex m4 || true
          sudo apt-get autoremove -y --purge
          sudo rm -rf /home/linuxbrew

      - name: Verify strip
        if: steps.check.outputs.has_packages == 'true'
        shell: bash
        run: |
          leaked=0
          for c in gcc g++ gfortran cc c++ clang ld as cmake patchelf; do
            if command -v "$c" >/dev/null 2>&1; then
              echo "::error::Leaked binary: $c at $(command -v "$c")"
              leaked=1
            fi
          done
          for lib in libgfortran libgomp libquadmath; do
            if /sbin/ldconfig -p 2>/dev/null | grep -q "$lib"; then
              hits=$(/sbin/ldconfig -p 2>/dev/null | grep "$lib" | tr -s ' ' || true)
              echo "::error::Leaked runtime lib $lib:"
              echo "$hits"
              leaked=1
            fi
          done
          if [ "$leaked" -ne 0 ]; then
            echo "Strip did not remove expected toolchain; aborting before test." >&2
            exit 1
          fi
          echo "Strip OK: no compiler binaries or runtime libs on the linker path."

      - name: Test bundled packages
        if: steps.check.outputs.has_packages == 'true'
        uses: matlab-actions/run-command@v2
        with:
          command: "addpath('mip'); addpath('scripts'); test_bundled_packages"

  upload-and-assemble:
    runs-on: ubuntu-latest
    needs: [test-any, test-linux, test-macos, build-windows, build-numbl-wasm, test-numbl-linux, test-numbl-macos]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests pyyaml

      - name: Download all bundled artifacts
        uses: actions/download-artifact@v4
        with:
          path: build/bundled
          pattern: bundled-*
          merge-multiple: true

      - name: Check for packages to upload
        id: check
        run: |
          if [ -d build/bundled ] && [ -n "$(ls -A build/bundled 2>/dev/null)" ]; then
            echo "has_packages=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_packages=false" >> "$GITHUB_OUTPUT"
            echo "No packages to upload"
          fi
        shell: bash

      - name: Upload packages to releases
        if: steps.check.outputs.has_packages == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/upload_packages.py

      - name: Assemble package index
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/assemble_index.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/gh-pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: upload-and-assemble
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
