        with:
          name: bundled-windows_x86_64
          path: build/bundled/

      - name: Strip build environment
        if: steps.check.outputs.has_packages == 'true'
        shell: pwsh
        run: |
          $vsInstaller = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
          $vsPath = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise"
          if ((Test-Path $vsInstaller) -and (Test-Path $vsPath)) {
            & $vsInstaller uninstall --installPath $vsPath --quiet --norestart --force --wait
          }
          if (Get-Command choco -ErrorAction SilentlyContinue) {
            choco list -r 2>$null | ForEach-Object {
              $pkg = ($_ -split '\|')[0]
              if ($pkg -and $pkg -ne 'chocolatey') {
                choco uninstall $pkg -y --force --skip-autouninstaller
              }
            }
          }
          $paths = @(
            "C:\Program Files\Microsoft Visual Studio",
            "C:\Program Files (x86)\Microsoft Visual Studio",
            "C:\Program Files (x86)\Windows Kits",
            "C:\Program Files\LLVM",
            "C:\Strawberry",
            "C:\msys64",
            "C:\mingw64",
            "C:\ProgramData\chocolatey",
            "C:\Program Files\CMake",
            "C:\Program Files\Git\mingw64"
          )
          foreach ($p in $paths) {
            Remove-Item -Recurse -Force -ErrorAction SilentlyContinue $p
          }

      - name: Test bundled packages
        if: steps.check.outputs.has_packages == 'true'
        uses: matlab-actions/run-command@v2
        with:
          command: "addpath('mip'); addpath('scripts'); test_bundled_packages"

