            'gfortran-*' gfortran \
            'cmake*' make ninja-build \
            'libstdc++-*-dev' 'libgcc-*-dev' libc6-dev \
            patchelf build-essential \
            'binutils*' \
            autoconf automake libtool pkg-config || true
          sudo apt-get autoremove -y --purge
          sudo rm -f /usr/local/bin/gfortran /usr/local/bin/gcc /usr/local/bin/g++

      - name: Test bundled packages
        if: steps.check.outputs.has_packages == 'true'
        uses: matlab-actions/run-command@v2
        with:
          command: "addpath('mip'); addpath('scripts'); test_bundled_packages"

  upload-and-assemble:
    runs-on: ubuntu-latest
    needs: [build-any, build-linux, build-macos, build-windows, build-numbl-wasm, build-numbl-linux, build-numbl-macos]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests pyyaml

      - name: Download all bundled artifacts
        uses: actions/download-artifact@v4
        with:
          path: build/bundled
          pattern: bundled-*
          merge-multiple: true

      - name: Check for packages to upload
        id: check
        run: |
          if [ -d build/bundled ] && [ -n "$(ls -A build/bundled 2>/dev/null)" ]; then
            echo "has_packages=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_packages=false" >> "$GITHUB_OUTPUT"
            echo "No packages to upload"
          fi
        shell: bash

      - name: Upload packages to releases
        if: steps.check.outputs.has_packages == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/upload_packages.py

      - name: Assemble package index
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/assemble_index.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/gh-pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: upload-and-assemble
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
